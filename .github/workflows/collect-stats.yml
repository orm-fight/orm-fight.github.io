name: collect-stats

# Refreshes data on the stats-history branch only. Main is never touched.
#
# Each run writes, on stats-history:
# - data/stats.json + data/sbom/<repo>.json — the latest summary the site renders.
# - data/trends.json — derived rolling-window view of the archive.
# - history/<repo>/<YYYY-MM-DD>.json — the day's per-repo snapshot.
#
# The deploy-site workflow takes care of getting these onto Pages.

on:
  schedule:
    # 05:17 UTC daily — outside GitHub's busy cron windows so we don't
    # queue behind hundreds of other 00:00 / 06:00 jobs.
    - cron: '17 5 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Snapshot date (YYYY-MM-DD). Defaults to today (UTC).'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: collect-stats
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout main (scripts and site code)
        uses: actions/checkout@v4
        with:
          # Needed for fetching stats-history later.
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone sibling ledger-* repos
        # The collector walks ../ledger-* directories for direct-dep info
        # from each package.json. We shallow-clone every public
        # ledger-* repo in the org alongside this checkout.
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/.."
          gh api 'orgs/orm-fight/repos?per_page=100' \
            --jq '.[] | select(.name | startswith("ledger-")) | .name' \
            | while IFS= read -r repo; do
              echo "Cloning $repo"
              gh repo clone "orm-fight/$repo" "$repo" -- --depth=1 --quiet
            done

      - name: Collect stats
        # Writes data/stats.json + data/sbom/<repo>.json into the runner's
        # working copy. These never get committed to main — the next steps
        # move them to the stats-history worktree.
        run: node scripts/collect-stats.js

      - name: Resolve snapshot date
        id: date
        run: |
          d='${{ github.event.inputs.date }}'
          [ -z "$d" ] && d=$(date -u +%Y-%m-%d)
          echo "date=$d" >> "$GITHUB_OUTPUT"
          echo "Snapshot date: $d"

      - name: Configure git identity
        run: |
          git config user.name 'orm-fight-bot'
          git config user.email '278690365+orm-fight-bot@users.noreply.github.com'

      - name: Prepare stats-history worktree
        run: |
          set -euo pipefail
          WT="$RUNNER_TEMP/history-wt"

          git fetch origin stats-history --quiet 2>/dev/null || true
          if git rev-parse --verify --quiet origin/stats-history >/dev/null; then
            git worktree add -B stats-history "$WT" origin/stats-history
          else
            echo "stats-history doesn't exist — creating orphan branch"
            git worktree add --orphan -b stats-history "$WT"
          fi

      - name: Write today's history snapshot into stats-history
        run: node scripts/write-history.js --out "$RUNNER_TEMP/history-wt" --date '${{ steps.date.outputs.date }}'

      - name: Build trends.json against the merged archive
        run: |
          WT="$RUNNER_TEMP/history-wt"
          mkdir -p "$WT/data"
          node scripts/build-trends.js --history "$WT" --out "$WT/data/trends.json"

      - name: Copy latest stats and SBOMs into stats-history
        run: |
          set -euo pipefail
          WT="$RUNNER_TEMP/history-wt"
          mkdir -p "$WT/data/sbom"
          cp data/stats.json "$WT/data/stats.json"
          # Clear the previous SBOM set so removed repos don't linger.
          rm -f "$WT"/data/sbom/*.json
          cp -R data/sbom/. "$WT/data/sbom/"

      - name: Commit and push stats-history
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/history-wt"
          git add data/ history/
          if git diff --quiet --cached; then
            echo "No changes to stats-history"
          else
            git commit -m "stats: ${{ steps.date.outputs.date }}"
            git push origin stats-history
          fi
